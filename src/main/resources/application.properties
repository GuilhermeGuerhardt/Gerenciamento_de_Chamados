# ============================================================
#  Perfil padrao: desenvolvimento local (H2 em arquivo).
#  Producao fica em application-prod.properties, ativado com
#  SPRING_PROFILES_ACTIVE=prod.
# ============================================================

spring.application.name=Gerenciamento de Chamados

# A 8080 esta reservada pelo Windows nesta maquina (faixa de portas excluidas),
# por isso o padrao local e 8090. Em nuvem, a plataforma injeta a porta em PORT.
server.port=${PORT:8090}

# ---- Banco H2 em arquivo (pasta ./data) ----
# Os dados ficam em data/chamados.mv.db e sobrevivem ao reinicio da aplicacao.
spring.datasource.url=jdbc:h2:file:./data/chamados;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console do H2 em http://localhost:8090/h2-console (somente ADMIN)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JPA / Hibernate ----
# "update" mantem os dados entre execucoes e ajusta o schema conforme as entidades mudam.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Mantem a sessao JPA aberta durante a renderizacao das telas. As paginas leem
# associacoes lazy (chamado.cliente, chamado.tecnico, contato.cliente) direto no
# Thymeleaf; sem isso cada uma exigiria um fetch join proprio.
spring.jpa.open-in-view=true

# ---- Thymeleaf ----
spring.thymeleaf.cache=false

# ---- Formatacao de datas nos formularios ----
spring.mvc.format.date=dd/MM/yyyy
spring.mvc.format.date-time=dd/MM/yyyy HH:mm

# ---- Upload / mensagens ----
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# ---- Usuario administrador criado no primeiro start ----
# Os valores apos ":" sao apenas o padrao de desenvolvimento. Em producao, defina
# as variaveis de ambiente ADMIN_EMAIL / ADMIN_SENHA para nao usar a senha padrao.
app.admin.email=${ADMIN_EMAIL:admin@digitrix.com.br}
app.admin.senha=${ADMIN_SENHA:admin123}
app.admin.nome=${ADMIN_NOME:Administrador}
