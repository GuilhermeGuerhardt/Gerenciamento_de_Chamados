# ============================================================
#  Perfil de PRODUCAO (Render + Supabase).
#  Ative com a variavel de ambiente: SPRING_PROFILES_ACTIVE=prod
#
#  Nenhuma credencial fica neste arquivo: tudo vem de variaveis de
#  ambiente configuradas no painel do Render.
# ============================================================

# ---- Banco: PostgreSQL do Supabase ----
# DATABASE_URL no formato:
#   jdbc:postgresql://aws-0-sa-east-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# O free tier do Supabase permite poucas conexoes simultaneas e o Render pode
# subir mais de uma instancia. Um pool pequeno evita esgotar o limite do banco.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
# O pooler do Supabase derruba conexoes ociosas; reciclamos antes disso.
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.idle-timeout=300000

# ---- JPA / Hibernate ----
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=true

# "update" cria e ajusta as tabelas sozinho, o que e pratico para comecar.
# Ele nunca apaga coluna nem tabela, mas tambem nao versiona as mudancas:
# quando o sistema tiver dados reais, o certo e migrar para Flyway e trocar
# este valor por "validate".
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

# ---- Desligado em producao ----
# O console do H2 nao faz sentido aqui e seria uma porta de entrada a mais.
spring.h2.console.enabled=false

# Templates em cache: em producao eles nunca mudam sem um novo deploy.
spring.thymeleaf.cache=true

# Nao cria o cliente/chamado de demonstracao no banco de producao.
app.dados-exemplo=${DADOS_EXEMPLO:false}

# ---- Administrador ----
# Sem valor padrao, de proposito: aqui as variaveis NAO tem ":" com fallback.
# No application.properties elas caem em admin@suaempresa.com.br / admin123, o que
# e util no desenvolvimento e seria um desastre num sistema exposto na internet.
# Assim, faltando qualquer uma delas a aplicacao se recusa a subir e diz qual e,
# em vez de ficar no ar com a senha padrao que esta publicada no README.
app.admin.email=${ADMIN_EMAIL}
app.admin.senha=${ADMIN_SENHA}

# ---- Cookie de sessao ----
# O Render serve tudo por HTTPS; marcamos o cookie como seguro e inacessivel
# ao JavaScript, e SameSite=Lax protege contra CSRF vindo de outro site.
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# O Render termina o TLS num proxy na frente da aplicacao. Sem isto o Spring
# acha que a requisicao e HTTP e monta redirects com o esquema errado.
server.forward-headers-strategy=framework

# ---- Logs ----
logging.level.root=INFO
logging.level.br.com.digitrix.chamados=INFO
logging.level.org.hibernate.SQL=WARN
